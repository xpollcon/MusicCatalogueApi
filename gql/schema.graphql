schema {
  query: Query
  mutation: Mutation
}

type Query {
  getAlbum(id: String!): Album
  getAlbumsByArtist(artist: String!): [Album!]!
  sayHello(name: String): String
  sayGoodbye(name: String): String
}

type Mutation {
  addAlbum(artist: String!, title: String!, mediaType: String!): Album!
}

type Album {
  id: String!
  artist: String!
  title: String!
  mediaType: String!
  condition: String

}
